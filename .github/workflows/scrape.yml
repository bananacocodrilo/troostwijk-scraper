name: Troostwijk Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/latest.json output/rejected.json output/bid_history.json output/lot_registry.json output/price_cache.json output/asking_listings.json
          git add output/notified.json 2>/dev/null || true
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "update"
          # Retry push with -X theirs rebase to survive concurrent CI runs racing
          # on output/*.json. Our run's output is always fresher than what we'd
          # otherwise discard — but theirs is also a valid recent state; the
          # next run will overwrite. Up to 3 attempts.
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep $((i * 5))
          done
          echo "push failed after 3 attempts"; exit 1
