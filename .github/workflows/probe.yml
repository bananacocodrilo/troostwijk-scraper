name: Source Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run probe
        run: python probe_sources.py

      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/source_probe.json
          git diff --cached --quiet && echo "no changes" || (git commit -m "probe: source viability report" && git pull --rebase origin main && git push)
