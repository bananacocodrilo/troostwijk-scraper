<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asking Prices Aggregator</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e8eaf2;
      --muted: #7b82a8;
      --accent: #5b7fff;
      --green: #2dd4a0;
      --yellow: #f5c842;
      --red: #f55;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font: 14px/1.5 'Inter', system-ui, sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    header h1 span { color: var(--accent); }
    .meta { margin-left: auto; color: var(--muted); font-size: 12px; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 12px; }
    .stat b { color: var(--accent); }

    .controls {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .controls select, .controls input[type=range] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
    .controls input[type=range] { width: 110px; padding: 0; }
    .controls input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; margin: 0; }
    .controls label.check { cursor: pointer; color: var(--text); font-weight: 600; }
    .controls .hint { font-size: 10px; color: var(--muted); opacity: .75; border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
    .tagline { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    #scoreVal { font-weight: 600; color: var(--accent); min-width: 28px; }
    #count { margin-left: auto; color: var(--muted); font-size: 12px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow);
      transition: transform .15s, border-color .15s;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card.underpriced { border-color: var(--green); }

    .card-thumb {
      width: 100%; aspect-ratio: 4 / 3;
      object-fit: cover; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: block;
    }
    .card-thumbs { display: block; line-height: 0; }
    .card-thumbs.multi {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .card-thumbs.multi .card-thumb {
      aspect-ratio: 1 / 1;
      border-bottom: none;
    }
    .card-thumb-placeholder {
      width: 100%; aspect-ratio: 4 / 3;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 11px;
    }

    .card-top {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 14px 16px 10px;
    }
    .score-badge {
      font-size: 22px; font-weight: 800; line-height: 1;
      min-width: 46px; text-align: center;
      padding: 6px 8px; border-radius: 8px;
      background: var(--surface2);
    }
    .score-badge.s-high { color: var(--green); background: #0d2e20; }
    .score-badge.s-mid  { color: var(--yellow); background: #2d2600; }
    .score-badge.s-low  { color: var(--muted); }
    .card-title { font-weight: 700; font-size: 15px; line-height: 1.3; word-break: break-word; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 8px; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; border: 1px solid transparent;
    }
    .badge-size      { background: #1a2a4a; color: #7ab4ff; border-color: #2a3a6a; }
    .badge-source    { background: #22263a; color: var(--muted); border-color: var(--border); }
    .badge-under     { background: #0d2e20; color: var(--green); border-color: #1a4a30; }
    .badge-over      { background: #2a0d0d; color: var(--red); border-color: #5a1a1a; }
    .badge-fair      { background: #2d2600; color: var(--yellow); border-color: #4a3d00; }

    /* ── RISK BADGE ──────────────────────────── */
    .risk-pill {
      font-size: 11px; font-weight: 700;
      border-radius: 20px; padding: 2px 9px;
      border: 1px solid transparent;
      vertical-align: middle; margin-left: 4px;
      cursor: help;
    }
    .risk-pill.r-clean { background: #0d2a1a; color: var(--green); border-color: #1a4a2a; }
    .risk-pill.r-low   { background: #2d2600; color: var(--yellow); border-color: #4a3d00; }
    .risk-pill.r-mid   { background: #2d1f00; color: #f5a142; border-color: #4a3600; }
    .risk-pill.r-high  { background: #3a0d0d; color: #ff8a8a; border-color: #6a1a1a; }
    details.risk-details { margin: 6px 16px 0; }
    details.risk-details > summary {
      list-style: none; cursor: pointer; outline: none;
    }
    details.risk-details > summary::-webkit-details-marker { display: none; }
    details.risk-details[open] > summary .risk-pill::after { content: ' ▴'; }
    details.risk-details:not([open]) > summary .risk-pill[data-has-flags="1"]::after { content: ' ▾'; }
    .risk-flag-list {
      list-style: none; padding: 6px 0 0 0;
      font-size: 11.5px; line-height: 1.5;
    }
    .risk-flag-list li {
      padding: 2px 8px; margin: 2px 0; border-radius: 4px;
      background: var(--surface2); color: var(--text);
      border-left: 3px solid var(--border);
    }
    .risk-flag-list li.sev-info { border-left-color: var(--accent); }
    .risk-flag-list li.sev-warn { border-left-color: var(--yellow); }
    .risk-flag-list li.sev-high { border-left-color: var(--red); color: #ff8a8a; }

    .specs {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3px 8px;
      padding: 8px 16px;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .specs .s-icon { margin-right: 4px; }

    .prices { padding: 12px 16px; display: flex; flex-direction: column; gap: 5px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .price-row .label { color: var(--muted); }
    .price-row .value { font-weight: 600; }
    .price-row .value.na { color: var(--muted); font-style: italic; font-weight: 400; }
    .price-row.headline {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px; margin-bottom: 4px;
    }
    .price-row.headline .label { color: var(--text); font-weight: 600; }
    .headline-val { color: var(--accent) !important; font-size: 18px !important; }
    .price-row.headline.underpriced { background: #0d2a1a; border-color: #1a4a2a; }
    .price-row.headline.underpriced .headline-val { color: var(--green) !important; }
    .pct-label {
      font-size: 13px; font-weight: 700; margin-top: 4px;
      text-align: right;
    }
    .pct-label.under   { color: var(--green); }
    .pct-label.fair    { color: var(--yellow); }
    .pct-label.over    { color: var(--red); }
    .pct-label.unknown { color: var(--muted); }

    /* ── CONVERSION COST ─────────────────────── */
    .conv-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 12px; color: var(--muted);
      margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
    }
    .conv-row .effort {
      font-weight: 600; padding: 1px 6px; border-radius: 4px; font-size: 10.5px;
    }
    .effort.minimal  { color: var(--green); background: #0d2e20; }
    .effort.light    { color: #c9e070;       background: #1f2a10; }
    .effort.moderate { color: var(--yellow); background: #2d2600; }
    .effort.heavy    { color: var(--red);    background: #2a0d0d; }
    .total-project {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 4px; padding-top: 5px; border-top: 1px dashed var(--border);
      font-weight: 700; font-size: 13px; color: var(--text);
    }
    .total-project .value { color: #ffe082; }

    .card-footer {
      margin-top: auto;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted);
    }
    .card-footer a {
      color: var(--accent); text-decoration: none; font-weight: 600;
      font-size: 12px;
    }
    .card-footer a:hover { text-decoration: underline; }

    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 64px; color: var(--muted); font-size: 15px;
    }

    .nav-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 4px;
      padding: 8px 24px;
    }
    .nav-bar a {
      font-size: 13px; font-weight: 600; padding: 5px 14px; border-radius: 6px;
      text-decoration: none; color: var(--muted);
      border: 1px solid transparent;
      transition: color .15s, border-color .15s, background .15s;
    }
    .nav-bar a:hover { color: var(--text); border-color: var(--border); }
    .nav-bar a.active { color: var(--accent); background: var(--surface); border-color: var(--border); }
    .nav-sep { color: var(--border); }
  </style>
</head>
<body>

<nav class="nav-bar">
  <a href="index.html">🏕️ High-Roof L2H2</a>
  <span class="nav-sep">|</span>

  <span class="nav-sep">|</span>

</nav>

<header>
  <div>
    <h1>🛒 Asking <span>Prices</span></h1>
    <p class="tagline">All sources · NL + DE + BE · default view: ≤200k km · ≤€13k (+VAT) · 2017+</p>
  </div>
  <div class="stats" id="stats"></div>
  <div class="meta" id="updatedAt">Loading…</div>
</header>

<div class="controls">
  <label>
    Model
    <select id="groupFilter">
      <option value="">All models</option>
    </select>
  </label>
  <label>
    Country
    <select id="countryFilter">
      <option value="">All countries</option>
      <option value="NL">🇳🇱 NL</option>
      <option value="BE">🇧🇪 BE</option>
      <option value="DE">🇩🇪 DE</option>
    </select>
  </label>
  <label>
    Source
    <select id="sourceFilter">
      <option value="">All sources</option>
    </select>
  </label>
  <label>
    Deal
    <select id="dealFilter">
      <option value="">All listings</option>
      <option value="under">Underpriced only</option>
      <option value="fair">Fair price (±15%)</option>
      <option value="over">Overpriced (+15%)</option>
    </select>
  </label>
  <label>
    Year ≥ <span id="yearMinVal">2017</span>
    <input type="range" id="yearMinFilter" min="2010" max="2026" step="1" value="2017" />
  </label>
  <label>
    Km ≤ <span id="kmMaxVal">200k</span>
    <input type="range" id="kmMaxFilter" min="0" max="400000" step="10000" value="200000" />
  </label>
  <label title="Asking price. Lease sources (Regeljelease / FinancialLease) are ex-VAT; marketplaces are usually incl-VAT or margin.">
    Max price <span id="priceVal">€13k</span> <span class="hint">+VAT</span>
    <input type="range" id="priceFilter" min="2000" max="40000" step="500" value="13000" />
  </label>
  <label>
    Max risk <span id="riskVal">5</span>
    <input type="range" id="riskFilter" min="0" max="5" step="1" value="5" title="Hide listings with risk_score above this" />
  </label>
  <label class="check" title="Only crew-cab / 6+ seat vans (from seat data, or a 'Dubbele Cabine / DC / 6-persoons' title marker). Seats are a plus, not required.">
    <input type="checkbox" id="sixSeatFilter" />
    6+ seats
  </label>
  <label class="check" title="L3 / long-wheelbase vans are harder to park and hidden by default. Tick to include them. Only CONFIRMED L3 (explicit L3 code) is hidden — unknown length always shows.">
    <input type="checkbox" id="showL3Filter" />
    Show L3
  </label>
  <label>
    Sort by
    <select id="sortBy">
      <option value="under_first">⭐ Cheapest vs peers</option>
      <option value="price">Price (lowest)</option>
      <option value="year">Year (newest)</option>
      <option value="km">Mileage (lowest)</option>
      <option value="score">Suitability score</option>
    </select>
  </label>
  <button id="exportBtn" title="Download the currently shown listings (after filters + dismissed/bookmarked) as evaluation JSON" style="background:var(--accent);color:#06281e;border:none;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;">⬇ Export JSON</button>
  <span id="count"></span>
</div>

<div class="grid" id="grid">
  <div class="empty">Loading listings…</div>
</div>

<script src="overrides.js"></script>
<script>
const DATA_URL = 'https://raw.githubusercontent.com/bananacocodrilo/troostwijk-scraper/main/output/asking_listings.json';

let allListings = [];
let shownListings = [];   // current filtered+override-applied view, for export

function fmt(n, prefix='€') {
  if (n == null) return null;
  return prefix + Math.round(n).toLocaleString('nl-NL');
}

function scoreClass(s) {
  if (s >= 75) return 's-high';
  if (s >= 50) return 's-mid';
  return 's-low';
}

const SOURCE_LABEL = {
  'marktplaats':      '🇳🇱 Marktplaats',
  '2dehands':         '🇧🇪 2dehands',
  'autoscout24_nl':   '🇳🇱 AutoScout24',
  'autoscout24_de':   '🇩🇪 AutoScout24',
  'autotrack':        '🇳🇱 AutoTrack',
  'kleinanzeigen_de': '🇩🇪 Kleinanzeigen',
  'mobile_de':        '🇩🇪 mobile.de',
  'regeljelease':     '🇳🇱 Regeljelease (lease)',
  'financiallease':   '🇳🇱 FinancialLease (lease)',
  'rosfinance':       '🇳🇱 RosFinance (lease)',
};

const GROUP_LABEL = {
  'transit_custom_l2h1':        'Transit Custom',
  'expert_jumpy_proace_l2':     'Expert / Jumpy / ProAce',
  'scudo_gen3':                  'Scudo (2022+)',
  'vivaro_trafic_primastar_l2': 'Vivaro / Trafic / Primastar',
  't6_1_lwb':                   'VW Transporter T6',
  'psa_l1l2h1':                 'Boxer / Ducato / Jumper',
  'vito_v_class_l2':            'Vito / V-Class',
  'hyundai_staria':             'Hyundai Staria',
  'ford_transit_l2h2':          'Ford Transit (full-size)',
  'mercedes_sprinter':          'Mercedes Sprinter',
  'vw_crafter_tge':             'VW Crafter / MAN TGE',
  'renault_master_grp':         'Master / Movano / Interstar',
};

function countryFromSource(source) {
  if (source === '2dehands') return 'BE';
  if (source === 'autoscout24_de' || source === 'kleinanzeigen_de' || source === 'mobile_de') return 'DE';
  return 'NL';
}

// Prefer the explicit per-listing country field; fall back to the source heuristic.
function countryOf(v) {
  return v.country ? v.country.toUpperCase() : countryFromSource(v.source);
}

// 6+ seat detection: structured seats when known, else a crew-cab / passenger
// marker in the title or remarks (seats data is sparse on marketplace listings).
function isSixSeater(v) {
  if (v.seats != null) return v.seats >= 6;
  const hay = (v.title || '') + ' ' + (v.remarks || '');
  return /\b(dubbele?\s*cab\w*|dubbel\s*cabine|doppelkab\w*|crew\s*cab|mixto|kombi|combi|dc)\b/i.test(hay)
      || /\b[6-9]\s*-?\s*(persoons|pers|zit\w*|sitz\w*|seat\w*)\b/i.test(hay);
}

// CONFIRMED L3 only (explicit L3 code or roof-confirmed L3xx variant). Unknown
// length (L?, no variant) is never treated as L3, so it always shows.
function isL3(v) {
  return /^l3/i.test(v.variant || '');
}

// ── Export ───────────────────────────────────────────────────────────────
// Maps the currently-shown listings (filters + dismiss/bookmark applied) to a
// structured evaluation schema and downloads them as JSON. Fields we don't have
// data for are null/"unknown" so the shape is consistent for downstream review.
const SOURCE_NAME = {
  marktplaats:'Marktplaats', '2dehands':'2dehands.be', autoscout24_nl:'AutoScout24 (NL)',
  autoscout24_de:'AutoScout24 (DE)', autotrack:'AutoTrack', kleinanzeigen_de:'Kleinanzeigen.de',
  mobile_de:'mobile.de', regeljelease:'Regeljelease', financiallease:'FinancialLease', rosfinance:'RosFinance',
};
const TOKEN_MAKE = {
  'transit custom':'Ford','tourneo custom':'Ford','transit':'Ford',
  expert:'Peugeot',jumpy:'Citroën',proace:'Toyota','pro ace':'Toyota','proace verso':'Toyota','pro ace verso':'Toyota',
  traveller:'Peugeot',spacetourer:'Citroën','space tourer':'Citroën',scudo:'Fiat',
  vivaro:'Opel',trafic:'Renault',primastar:'Nissan',talento:'Fiat',
  transporter:'Volkswagen','t6.1':'Volkswagen',t6_1:'Volkswagen',crafter:'Volkswagen','e-crafter':'Volkswagen',tge:'MAN',
  boxer:'Peugeot',ducato:'Fiat',jumper:'Citroën',
  vito:'Mercedes-Benz','v-class':'Mercedes-Benz','v-klasse':'Mercedes-Benz','v klasse':'Mercedes-Benz',
  sprinter:'Mercedes-Benz',staria:'Hyundai',
  master:'Renault',movano:'Opel',interstar:'Nissan',nv400:'Nissan',
};
const CONF_SCORE = { high:0.9, medium:0.6, low:0.35 };
// Sources that are dealer-only; the rest (marktplaats/2dehands) are mixed C2C+dealer → null.
const DEALER_SOURCES = ['autoscout24_nl','autoscout24_de','autotrack','kleinanzeigen_de','mobile_de','regeljelease','financiallease','rosfinance'];

function titleCase(s){ return (s||'').replace(/\b\w/g, c => c.toUpperCase()); }
function djb2(str){ let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))>>>0; return h.toString(36); }
function listingId(v){
  const m=(v.url||'').match(/(\d{5,})/);
  return `${v.source||'src'}_${m?m[1]:djb2(v.url||v.title||'')}`;
}
function parsePowerHp(hay){
  let m=hay.match(/(\d{2,3})\s*(?:pk|hp|ps|bhp)\b/i);
  if(m) return parseInt(m[1]);
  m=hay.match(/(\d{2,3})\s*kw\b/i);
  if(m) return Math.round(parseInt(m[1])*1.341);
  return null;
}
function parseTransmission(hay){
  if(/\b(automaat|automatic|automatik|dsg|tiptronic|s-tronic|aut\.?)\b/i.test(hay)) return 'automatic';
  if(/\b(handgeschakeld|manual|schaltgetriebe|manueel|6-?bak|5-?bak)\b/i.test(hay)) return 'manual';
  return null;
}
function parseEngine(hay){ const m=hay.match(/\b(\d\.\d)\b/); return m ? m[1]+' diesel' : null; }
function standingHeight(variant){
  const s=(variant||'').toUpperCase();
  if(s.includes('H2')||s.includes('H3')) return true;
  if(s.includes('H1')) return false;
  return null;
}
function rustRisk(v){
  const f=(v.risk_flags||[]).map(x=>((x.label||'')+' '+(x.code||''))).join(' ').toLowerCase();
  return /rust|corros|roest/.test(f) ? 'high' : 'unknown';
}
function toExport(v){
  const hay=(v.title||'')+' '+(v.remarks||'');
  return {
    id: listingId(v),
    source: SOURCE_NAME[v.source]||v.source||null,
    url: v.url||null,
    basic:{
      make: TOKEN_MAKE[v.matched_token]||null,
      model: v.matched_token ? titleCase(v.matched_token) : null,
      variant: null,
      year: v.year??null,
      mileage_km: v.km??null,
      price_eur: v.price_eur??null,          // asking price as shown; VAT treatment varies by source
      country: v.country ? v.country.toUpperCase() : null,
      dealer: DEALER_SOURCES.includes(v.source) ? true : null,
    },
    configuration:{
      body_type: v.variant||null,
      seats: v.seats??null,                  // structured data only — never inferred from text
      layout: /\b(dubbele?\s*cab\w*|doppelkab\w*|crew\s*cab|dc)\b/i.test(hay) ? 'double_cab' : null,
      bulkhead:{ present:null, type:null, removable:null },
    },
    technical:{
      engine: parseEngine(hay),
      power_hp: parsePowerHp(hay),
      emissions: v.emission_standard || (/euro\s?6/i.test(hay) ? 'Euro 6' : 'unknown'),
      transmission: parseTransmission(hay),
    },
    condition:{ service_history:'unknown', accident_free:'unknown', rust_risk: rustRisk(v) },
    camper_relevance:{
      standing_height: standingHeight(v.variant),
      side_sleep_possible:null,
      estimated_bed_width_mm:null,
      estimated_bed_length_mm:null,
      bed_difficulty_score:null,
    },
    financials:{
      estimated_bpm_eur:null,
      total_import_cost_estimate:null,
      road_tax_nl_camper_estimate_month:null,
    },
    metadata:{
      last_seen: new Date().toISOString().slice(0,10),
      photos_count: Array.isArray(v.images) ? v.images.length : 0,
      confidence_score: CONF_SCORE[v.classification_confidence]??null,
    },
    // FleetView's own computed intel — not in the target schema, but kept because
    // it's the most useful evaluation signal we already have.
    fleetview_signals:{
      suitability_score: v.score??null,
      risk_score: v.risk_score??null,
      market_median_eur: v.market_median_eur??null,
      price_pct_vs_median: v.price_pct_vs_median??null,
      is_underpriced: !!v.is_underpriced,
      est_conversion_cost_eur: v.est_conversion_cost_eur??null,
      total_project_cost_eur: v.total_project_cost_eur??null,
      conversion_effort: v.conversion_effort??null,
    },
  };
}
function exportListings(){
  const arr=(shownListings||[]).map(toExport);
  const blob=new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`fleetview-export-${new Date().toISOString().slice(0,10)}-${arr.length}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

function pctClass(pct) {
  if (pct == null) return 'unknown';
  if (pct <= -15)  return 'under';
  if (pct >=  15)  return 'over';
  return 'fair';
}

function pctText(pct) {
  if (pct == null) return 'no peer data';
  const sign = pct > 0 ? '+' : '';
  return `${sign}${pct.toFixed(0)}% vs median`;
}

function riskPillClass(score) {
  if (!score || score <= 0) return 'r-clean';
  if (score === 1)          return 'r-low';
  if (score <= 3)           return 'r-mid';
  return 'r-high';
}

function riskPillLabel(score, flags) {
  const n = (flags || []).length;
  if (!score || score <= 0) return '✓ Clean';
  if (score >= 4)           return `⚠ Risky (${n})`;
  if (n === 1)              return '1 flag';
  return `${n} flags`;
}

function riskBlock(v) {
  const score = v.risk_score ?? 0;
  const flags = v.risk_flags || [];
  const cls = riskPillClass(score);
  const label = riskPillLabel(score, flags);
  const tooltip = flags.length
    ? flags.map(f => `[${f.severity}] ${f.label}`).join('\n')
    : 'No risk flags detected';
  if (!flags.length) {
    return `<span class="risk-pill ${cls}" title="${tooltip.replace(/"/g, '&quot;')}">${label}</span>`;
  }
  const items = flags.map(f =>
    `<li class="sev-${f.severity}">${f.label.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}</li>`
  ).join('');
  return `
    <details class="risk-details">
      <summary><span class="risk-pill ${cls}" data-has-flags="1" title="${tooltip.replace(/"/g, '&quot;')}">${label}</span></summary>
      <ul class="risk-flag-list">${items}</ul>
    </details>`;
}

function buildCard(v) {
  const score = v.score ?? 0;
  const price = v.price_eur;
  const med   = v.market_median_eur;
  const pct   = v.price_pct_vs_median;
  const under = v.is_underpriced;
  const pclass = pctClass(pct);
  const srcLabel = SOURCE_LABEL[v.source] || v.source || '—';

  const imgList = Array.isArray(v.images) && v.images.length ? v.images.slice(0, 2) : [];
  const altText = (v.title || '').replace(/"/g, '&quot;');
  const thumb = imgList.length
    ? `<a href="${v.url}" target="_blank" rel="noopener" class="card-thumbs ${imgList.length > 1 ? 'multi' : 'single'}">${imgList.map(src => `<img class="card-thumb" src="${src}" alt="${altText}" loading="lazy" onerror="this.style.display='none'" />`).join('')}</a>`
    : '';

  return `
<div class="card ${under ? 'underpriced' : ''}">
  ${Overrides.cardButtonsHtml(v.url)}
  ${thumb}
  <div class="card-top">
    <div class="score-badge ${scoreClass(score)}" title="Suitability score (year + mileage + size + fuel + bonuses)">${score}</div>
    <div>
      <div class="card-title">${v.title || '—'}</div>
      <div class="card-sub">${srcLabel}${v.variant ? ' · ' + v.variant : ''}</div>
    </div>
  </div>

  ${riskBlock(v)}

  <div class="badges">
    ${v.model_group ? `<span class="badge badge-size" title="${v.model_group}">${GROUP_LABEL[v.model_group] || v.model_group}</span>` : ''}
    ${v.variant ? `<span class="badge badge-size">${v.variant}</span>` : ''}
    ${v.classification_confidence ? `<span class="badge badge-source" title="Classifier confidence">${v.classification_confidence}</span>` : ''}
    ${under ? '<span class="badge badge-under">⭐ underpriced</span>' : ''}
    ${pclass === 'over' && pct != null ? '<span class="badge badge-over">⚠️ above median</span>' : ''}
  </div>

  <div class="specs">
    <span><span class="s-icon">📅</span>${v.year ?? '—'}</span>
    <span><span class="s-icon">🛣️</span>${v.km != null ? (v.km/1000).toFixed(0)+'k km' : '—'}</span>
    <span><span class="s-icon">🏷️</span>${v.source ? v.source.replace(/_/g, ' ') : '—'}</span>
    <span><span class="s-icon">📊</span>n=${v.market_sample_size ?? 0}</span>
  </div>

  <div class="prices">
    <div class="price-row headline ${under ? 'underpriced' : ''}">
      <span class="label">Asking price <small style="color:var(--muted);font-weight:400">(incl. BTW)</small></span>
      <span class="value headline-val">${price != null ? fmt(price) : '—'}</span>
    </div>
    <div class="price-row">
      <span class="label">Peer median (±2yr)</span>
      <span class="value">${med != null ? fmt(med) + ` <small style="color:var(--muted)">(n=${v.market_sample_size})</small>` : '<span class="na">insufficient peers</span>'}</span>
    </div>
    ${pct != null ? `<div class="pct-label ${pclass}">${pctText(pct)} ${pct <= -25 ? '🔥' : under ? '✓' : pct >= 15 ? '↑' : '~'}</div>` : ''}
    ${v.est_conversion_cost_eur != null ? `
    <div class="conv-row"
         title="Estimated DIY camper-conversion budget: €${(v.est_conversion_cost_low_eur||0).toLocaleString()}–€${(v.est_conversion_cost_high_eur||0).toLocaleString()}">
      <span>🔧 Conversion: ~${fmt(v.est_conversion_cost_eur)}</span>
      <span class="effort ${v.conversion_effort || 'moderate'}">${v.conversion_effort || '—'}</span>
    </div>
    ${v.total_project_cost_eur != null ? `
    <div class="total-project" title="Asking price + conversion midpoint">
      <span>Total project</span>
      <span class="value">${fmt(v.total_project_cost_eur)}</span>
    </div>
    ` : ''}
    ` : ''}
  </div>

  <div class="card-footer">
    <span>${v.model_group || ''}</span>
    <a href="${v.url}" target="_blank" rel="noopener">View listing →</a>
  </div>
</div>`;
}

function render() {
  const group   = document.getElementById('groupFilter').value;
  const country = document.getElementById('countryFilter').value;
  const source  = document.getElementById('sourceFilter').value;
  const deal    = document.getElementById('dealFilter').value;
  const yearMin = parseInt(document.getElementById('yearMinFilter').value);
  const kmMax   = parseInt(document.getElementById('kmMaxFilter').value);
  const maxPrice = parseFloat(document.getElementById('priceFilter').value);
  const maxRisk  = parseInt(document.getElementById('riskFilter').value);
  const sixSeat  = document.getElementById('sixSeatFilter').checked;
  const showL3   = document.getElementById('showL3Filter').checked;
  const sortKey  = document.getElementById('sortBy').value;

  let filtered = allListings.filter(v => {
    if (group  && v.model_group !== group) return false;
    if (country && countryOf(v) !== country) return false;
    if (source && v.source !== source) return false;
    if ((v.price_eur ?? 0) > maxPrice) return false;
    if ((v.risk_score ?? 0) > maxRisk) return false;
    if (v.year != null && v.year < yearMin) return false;
    if (v.km != null && v.km > kmMax) return false;
    if (sixSeat && !isSixSeater(v)) return false;
    if (!showL3 && isL3(v)) return false;
    if (deal === 'under' && !v.is_underpriced) return false;
    const p = v.price_pct_vs_median;
    if (deal === 'fair' && (p == null || p < -15 || p > 15)) return false;
    if (deal === 'over' && (p == null || p < 15)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (sortKey === 'price')  return (a.price_eur ?? 9e9) - (b.price_eur ?? 9e9);
    if (sortKey === 'year')   return (b.year ?? 0) - (a.year ?? 0);
    if (sortKey === 'km')     return (a.km ?? 9e9) - (b.km ?? 9e9);
    if (sortKey === 'score')  return (b.score ?? 0) - (a.score ?? 0);
    // 'under_first' default: underpriced first, then by score desc, then by price asc
    const au = a.is_underpriced ? 0 : 1;
    const bu = b.is_underpriced ? 0 : 1;
    if (au !== bu) return au - bu;
    if ((b.score ?? 0) !== (a.score ?? 0)) return (b.score ?? 0) - (a.score ?? 0);
    return (a.price_eur ?? 9e9) - (b.price_eur ?? 9e9);
  });

  filtered = Overrides.applyFilter(filtered);
  shownListings = filtered;
  document.getElementById('count').textContent = `${filtered.length} listing${filtered.length !== 1 ? 's' : ''} shown`;
  document.getElementById('grid').innerHTML = filtered.length
    ? filtered.map(buildCard).join('')
    : '<div class="empty">No listings match the current filters.</div>';
}

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    allListings = await r.json();

    // Populate group filter
    const groups = [...new Set(allListings.map(v => v.model_group).filter(Boolean))].sort();
    const gsel = document.getElementById('groupFilter');
    groups.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = GROUP_LABEL[g] || g; gsel.appendChild(o); });

    // Populate source filter
    const sources = [...new Set(allListings.map(v => v.source).filter(Boolean))].sort();
    const ssel = document.getElementById('sourceFilter');
    sources.forEach(s => {
      const o = document.createElement('option');
      o.value = s;
      o.textContent = SOURCE_LABEL[s] || s;
      ssel.appendChild(o);
    });

    // Stats
    const under = allListings.filter(v => v.is_underpriced).length;
    const withMedian = allListings.filter(v => v.market_median_eur != null).length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><b>${allListings.length}</b> listings</div>
      <div class="stat"><b>${under}</b> ⭐ underpriced (≥15% below median)</div>
      <div class="stat"><b>${withMedian}</b> with peer median</div>
      <div class="stat"><b>${sources.length}</b> sources</div>
    `;
    document.getElementById('updatedAt').textContent = 'Fetched ' + new Date().toLocaleTimeString();

    render();
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="empty">Failed to load data: ${e.message}</div>`;
  }
}

document.getElementById('groupFilter').addEventListener('change', render);
document.getElementById('countryFilter').addEventListener('change', render);
document.getElementById('sourceFilter').addEventListener('change', render);
document.getElementById('dealFilter').addEventListener('change', render);
document.getElementById('sortBy').addEventListener('change', render);
document.getElementById('sixSeatFilter').addEventListener('change', render);
document.getElementById('showL3Filter').addEventListener('change', render);
document.getElementById('exportBtn').addEventListener('click', exportListings);
document.getElementById('priceFilter').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('priceVal').textContent = '€' + Math.round(v/1000) + 'k';
  render();
});
document.getElementById('riskFilter').addEventListener('input', e => {
  document.getElementById('riskVal').textContent = e.target.value;
  render();
});
document.getElementById('yearMinFilter').addEventListener('input', e => {
  document.getElementById('yearMinVal').textContent = e.target.value;
  render();
});
document.getElementById('kmMaxFilter').addEventListener('input', e => {
  document.getElementById('kmMaxVal').textContent = Math.round(parseInt(e.target.value)/1000) + 'k';
  render();
});

load();
Overrides.init({ onChange: render });
</script>
</body>
